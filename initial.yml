name: Initial Pipeline

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '.github/**'
      - '.cicd/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      report_changed: ${{ steps.detect.outputs.report_changed }}
      model_changed: ${{ steps.detect.outputs.model_changed }}
      report_paths: ${{ steps.detect.outputs.report_paths }}
      model_paths: ${{ steps.detect.outputs.model_paths }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed artifacts
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          REPORT_CHANGED=false
          MODEL_CHANGED=false
          declare -A REPORT_DIRS
          declare -A MODEL_DIRS

          while IFS= read -r file; do
            if [[ "$file" =~ ^([^/]+\.Report)/ ]]; then
              REPORT_CHANGED=true
              REPORT_DIRS["${BASH_REMATCH[1]}"]=1
            fi
            if [[ "$file" =~ ^([^/]+\.SemanticModel)/ ]]; then
              MODEL_CHANGED=true
              MODEL_DIRS["${BASH_REMATCH[1]}"]=1
            fi
          done <<< "$CHANGED"

          REPORT_LIST=$(IFS=,; echo "${!REPORT_DIRS[*]}")
          MODEL_LIST=$(IFS=,; echo "${!MODEL_DIRS[*]}")

          echo "report_changed=$REPORT_CHANGED" >> $GITHUB_OUTPUT
          echo "model_changed=$MODEL_CHANGED"   >> $GITHUB_OUTPUT
          echo "report_paths=$REPORT_LIST"       >> $GITHUB_OUTPUT
          echo "model_paths=$MODEL_LIST"         >> $GITHUB_OUTPUT

  report-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.report_changed == 'true'
    uses: ./.github/workflows/report-checks.yml
    with:
      report_paths: ${{ needs.detect-changes.outputs.report_paths }}
    secrets: inherit

  model-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.model_changed == 'true'
    uses: ./.github/workflows/model-checks.yml
    with:
      model_paths: ${{ needs.detect-changes.outputs.model_paths }}
    secrets: inherit
