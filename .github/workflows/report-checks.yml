name: Report Checks

on:
  workflow_call:
    inputs:
      report_paths:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      report_paths:
        description: 'Comma-separated .Report directories (blank = all)'
        required: false
        type: string
        default: ''

jobs:
  report-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .cicd/requirements.txt

      - name: Run report checks
        env:
          REPORT_PATHS: ${{ inputs.report_paths }}
          APPROVED_THEMES: ${{ vars.APPROVED_THEMES }}
        run: python .cicd/scripts/check_report.py

      - name: Annotate results
        if: always()
        run: |
          if [ -f report-results.json ]; then
            python -c "
          import json, sys
          data = json.load(open('report-results.json'))
          for report, checks in data.items():
              for check, issues in checks.items():
                  for issue in issues:
                      print(f'::warning title={check}::{report} — {issue}')
          "
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-check-results
          path: report-results.json
